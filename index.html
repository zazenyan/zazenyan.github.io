<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>yzs</title>
    <style>
        :root {
            --bg-color: #000000;
            --nav-text: #888888;
            --nav-hover: #ffffff;
            --apple-font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: var(--apple-font);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- 顶部导航栏 (关于我在最左，整体居中) --- */
        nav {
            width: 100%;
            padding: 40px 0;
            display: flex;
            justify-content: center;
            gap: 50px;
            position: absolute;
            top: 0;
            z-index: 100;
        }

        nav a {
            color: var(--nav-text);
            text-decoration: none;
            font-size: 15px;
            font-weight: 400;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--nav-hover);
        }

        /* --- 主视觉区域 --- */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* 全屏 Canvas 容器 */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            nav {
                gap: 20px;
                padding: 30px 0;
            }
            nav a {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#about">关于我</a>
        <a href="#cognition">认知脑科学</a>
        <a href="#cycling">骑行</a>
        <a href="#investment">投资</a>
    </nav>

    <main>
        <canvas id="canvas-text"></canvas>
    </main>

    <script>
        const canvas = document.getElementById('canvas-text');
        const ctx = canvas.getContext('2d');
        let w, h;
        let dpr = window.devicePixelRatio || 1;

        // 提取自你提供的源码参数
        const colors = [
            "rgba(0, 153, 255, 1)",
            "rgba(0, 153, 255, 0.9)",
            "rgba(0, 153, 255, 0.8)",
            "rgba(0, 153, 255, 0.7)",
            "rgba(0, 153, 255, 0.6)",
            "rgba(0, 153, 255, 0.5)",
            "rgba(0, 153, 255, 0.4)",
            "rgba(0, 153, 255, 0.3)",
            "rgba(0, 153, 255, 0.2)",
            "rgba(0, 153, 255, 0.1)"
        ];
        const animationDuration = 20;
        const lineGap = 4;
        const curveIntensity = 60;
        const lineWidth = 1.5;

        function resize() {
            dpr = window.devicePixelRatio || 1;
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize);
        resize();

        let startTime = 0;

        function render(currentTime) {
            if (!startTime) startTime = currentTime;
            
            // 严格还原源码的时间与相位计算
            const elapsed = (currentTime - startTime) / 1000;
            const phase = (elapsed / animationDuration) * Math.PI * 2;

            ctx.clearRect(0, 0, w, h);

            // 1. 绘制文字作为“容器形状”
            const fontSize = w < 768 ? w * 0.12 : w * 0.08;
            ctx.font = `800 ${fontSize}px -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            // 字体稍微收紧，符合原版的 tracking-tight
            ctx.letterSpacing = '-2px'; 
            ctx.fillStyle = '#ffffff';
            ctx.fillText("hi, i'm yanzisheng", w / 2, h / 2);

            // 2. 锁定文字区域：背景填充为黑色
            ctx.globalCompositeOperation = 'source-in';
            ctx.fillStyle = '#050505'; // 极暗的背景，让蓝色波浪线凸显
            ctx.fillRect(0, 0, w, h);

            // 3. 在文字内部叠加波浪形贝塞尔曲线
            ctx.globalCompositeOperation = 'source-atop';

            const numLines = Math.floor(h / lineGap) + 10;
            for (let i = 0; i < numLines; i++) {
                const y = i * lineGap;

                // 核心正弦波动算法 (完全移植自 React 源码)
                const curve1 = Math.sin(phase) * curveIntensity;
                const curve2 = Math.sin(phase + 0.5) * curveIntensity * 0.6;

                const colorIndex = i % colors.length;
                ctx.strokeStyle = colors[colorIndex];
                ctx.lineWidth = lineWidth;

                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.bezierCurveTo(
                    w * 0.33, y + curve1,
                    w * 0.66, y + curve2,
                    w, y
                );
                ctx.stroke();
            }

            // 4. 重置混合模式，准备下一帧
            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(render);
        }

        // 启动动画循环
        requestAnimationFrame(render);
    </script>
</body>
</html>
