<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yanzisheng</title>
    <style>
        :root {
            --bg-color: #000000;
            --nav-text: #888888;
            --nav-hover: #ffffff;
            --apple-font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Segoe UI", Roboto, sans-serif;
        }

        body, html {
            margin: 0; padding: 0; background-color: var(--bg-color);
            font-family: var(--apple-font); height: 100vh; overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- 导航栏：极致居中适配 --- */
        nav {
            width: 100%; padding: 40px 0; display: flex; justify-content: center; 
            gap: 40px; position: absolute; top: 0; z-index: 100; box-sizing: border-box;
        }
        nav a {
            color: var(--nav-text); text-decoration: none; font-size: 15px; font-weight: 400;
            letter-spacing: 1px; transition: color 0.3s ease; cursor: pointer; white-space: nowrap;
        }
        nav a:hover, nav a.active { color: var(--nav-hover); }

        /* --- 主视觉区域 --- */
        main { position: relative; width: 100vw; height: 100vh; background: #000; }

        canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; 
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .text-mask-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
            display: flex; justify-content: center; align-items: center;
            background-color: #000; color: #fff; mix-blend-mode: multiply; pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .text-mask-container h1 {
            margin: 0; text-align: center; font-weight: 700; letter-spacing: -0.025em; 
            text-wrap: balance; font-size: clamp(2rem, 7vw, 5rem); 
        }

        /* --- 内容展示层 --- */
        #content-layer {
            position: absolute; top: 120px; left: 0; width: 100%; height: calc(100vh - 120px);
            z-index: 50; display: flex; flex-direction: column; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease; overflow-y: auto;
        }
        .article-list { width: 100%; max-width: 680px; padding: 0 20px 100px 20px; box-sizing: border-box; }
        
        /* 文章卡片：方案一优雅跳转样式 */
        .article-card {
            display: block; text-decoration: none; padding: 25px; margin-bottom: 16px;
            background: rgba(20, 20, 20, 0.6); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px; backdrop-filter: blur(12px);
            transform: translateY(20px); transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .article-card:hover { 
            background: rgba(30, 30, 30, 0.8); border-color: rgba(255, 255, 255, 0.15); 
            transform: translateY(-2px);
        }
        .article-title { color: #f5f5f7; font-size: 19px; font-weight: 600; margin: 0 0 10px 0; }
        .article-meta { color: #555; font-size: 13px; display: flex; justify-content: space-between; }
        .article-card::after {
            content: "阅读全文 →"; display: block; margin-top: 12px; font-size: 12px; color: #444; transition: color 0.3s;
        }
        .article-card:hover::after { color: #aaa; }

        /* --- 核心切换态：内容打开时背景彻底黑掉 --- */
        body.module-active canvas { opacity: 0; } 
        body.module-active .text-mask-container { opacity: 0; } 
        body.module-active #content-layer { opacity: 1; pointer-events: auto; }
        body.module-active .article-card { transform: translateY(0); }

        .loading-text { color: #444; margin-top: 60px; font-size: 14px; letter-spacing: 1px; text-align: center; }

        /* --- 手机端适配修复 --- */
        @media (max-width: 768px) {
            nav { gap: 15px; padding: 30px 10px; }
            nav a { font-size: 13px; letter-spacing: 0; }
            #content-layer { top: 90px; height: calc(100vh - 90px); }
            .article-card { padding: 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <a onclick="routeTo('about')" id="nav-about">关于我</a>
        <a onclick="routeTo('cognition')" id="nav-cognition">认知脑科学</a>
        <a onclick="routeTo('cycling')" id="nav-cycling">骑行</a>
        <a onclick="routeTo('investment')" id="nav-investment">投资</a>
    </nav>

    <main>
        <canvas id="canvas-lines"></canvas>
        <div class="text-mask-container"><h1>hi, i'm yanzisheng</h1></div>
    </main>

    <div id="content-layer">
        <div id="module-about" class="article-list" style="display: none;">
             <div class="article-card" style="cursor: default; pointer-events: none;">
                <h3 class="article-title">Zisheng Yan</h3>
                <p style="color:#888; line-height:1.8; font-size:15px; margin:0;">
                    此博客用于记录成长过程中的思考。导航栏分为认知脑科学、骑行和投资。认知脑科学板块主要记录读心理学、社会学、哲学产生的思考。骑行板块记录骑行过程中实践而来的思想，相较于读书产生的思想，这类思想是符号落地的、真实的，我把它称为"感觉"。投资板块来历很有意思，我本来对金融没啥兴趣，从2024年10.31日A股开户，账户亏钱倒逼我不得不去学习金融，刚开始是研究K线图，K线图看不懂，就看价值投资，到现在刚刚对债务有了解，债务更贴近现实，让我对金融的兴趣进一步加深。2026/3/12
                </p>
             </div>
        </div>
        <div id="article-container" class="article-list" style="display: none;"></div>
    </div>

    <script>
        const API_URL = 'https://zazenyan-github-io-q1gd.vercel.app/api/notion'; 

        async function routeTo(moduleName) {
            const body = document.body;
            const navItems = document.querySelectorAll('nav a');
            const container = document.getElementById('article-container');
            const about = document.getElementById('module-about');

            if (document.getElementById(`nav-${moduleName}`).classList.contains('active')) {
                body.classList.remove('module-active');
                navItems.forEach(a => a.classList.remove('active'));
                return;
            }

            navItems.forEach(a => a.classList.remove('active'));
            document.getElementById(`nav-${moduleName}`).classList.add('active');
            
            about.style.display = (moduleName === 'about') ? 'block' : 'none';
            container.style.display = (moduleName === 'about') ? 'none' : 'block';

            if (moduleName !== 'about') {
                await loadNotionData(moduleName);
            }
            body.classList.add('module-active');
        }

        async function loadNotionData(moduleKey) {
            const container = document.getElementById('article-container');
            container.innerHTML = '<div class="loading-text">SYNCING NOTION...</div>';

            const categoryMap = { 'cognition': '认知', 'cycling': '骑行', 'investment': '投资' };
            const targetCategory = categoryMap[moduleKey];

            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                const articles = data.results.map(page => {
                    // 兼容 Notion 不同的属性设置方式
                    const rawCategory = page.properties.Category?.select?.name || 
                                       page.properties.Category?.rich_text[0]?.plain_text || '';
                    
                    return {
                        title: (page.properties.Name.title[0]?.plain_text || '未命名文章').trim(),
                        date: page.properties.Date?.date?.start || '2026-xx-xx',
                        category: rawCategory.trim(),
                        // 强制给 Notion 链接加上深色模式参数 (?pvs=4)
                        url: `https://www.notion.so/${page.id.replace(/-/g, '')}?pvs=4`
                    };
                });

                const filtered = articles.filter(a => a.category === targetCategory);

                if (filtered.length === 0) {
                    container.innerHTML = `<div class="loading-text">"${targetCategory}" 目录下暂无内容</div>`;
                    return;
                }

                container.innerHTML = filtered.map(a => `
                    <a href="${a.url}" target="_blank" class="article-card">
                        <h3 class="article-title">${a.title}</h3>
                        <div class="article-meta"><span>${a.date}</span></div>
                    </a>
                `).join('');

            } catch (err) {
                container.innerHTML = `<div class="loading-text">CONNECTION FAILED: ${err.message}</div>`;
            }
        }

        // --- Canvas 背景逻辑 ---
        const canvas = document.getElementById('canvas-lines');
        const ctx = canvas.getContext('2d');
        let w, h;
        const colors = ["#FF006E", "#8338EC", "#00F5D4", "#FFBE0B"];
        
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            w = window.innerWidth; h = window.innerHeight;
            canvas.width = w * dpr; canvas.height = h * dpr;
            canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize); resize();

        let startTime = 0;
        function render(currentTime) {
            if (!startTime) startTime = currentTime;
            const elapsed = (currentTime - startTime) / 1000;
            const phase = (elapsed / 20) * Math.PI * 2;
            ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, w, h);
            for (let i = 0; i < Math.floor(h / 4) + 10; i++) {
                const y = i * 4;
                ctx.strokeStyle = colors[i % colors.length];
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.bezierCurveTo(w*0.33, y + Math.sin(phase)*60, w*0.66, y + Math.sin(phase+0.5)*36, w, y);
                ctx.stroke();
            }
            requestAnimationFrame(render);
        }
        requestAnimationFrame(render);
    </script>
</body>
</html>
