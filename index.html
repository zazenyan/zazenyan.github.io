<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yanzisheng</title>
    <style>
        :root {
            --bg-color: #000000;
            --nav-text: #888888;
            --nav-hover: #ffffff;
            --apple-font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            margin: 0; padding: 0; background-color: var(--bg-color);
            font-family: var(--apple-font); height: 100vh; overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- 导航栏 --- */
        nav {
            width: 100%; padding: 40px 0; display: flex; justify-content: center; gap: 50px;
            position: absolute; top: 0; z-index: 100;
        }
        nav a {
            color: var(--nav-text); text-decoration: none; font-size: 15px; font-weight: 400;
            letter-spacing: 1px; transition: color 0.3s ease; cursor: pointer;
        }
        nav a:hover, nav a.active { color: var(--nav-hover); }

        /* --- 主视觉 --- */
        main { position: relative; width: 100vw; height: 100vh; background: #000; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; transition: opacity 0.5s ease; }
        .text-mask-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
            display: flex; justify-content: center; align-items: center;
            background-color: #000; color: #fff; mix-blend-mode: multiply; pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .text-mask-container h1 {
            margin: 0; text-align: center; font-weight: 700; letter-spacing: -0.025em; 
            text-wrap: balance; font-size: clamp(2rem, 7vw, 5rem); 
        }

        /* --- 内容层 --- */
        #content-layer {
            position: absolute; top: 120px; left: 0; width: 100%; height: calc(100vh - 120px);
            z-index: 50; display: flex; flex-direction: column; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease; overflow-y: auto;
        }
        .article-list { width: 100%; max-width: 680px; padding: 0 20px 100px 20px; box-sizing: border-box; }
        
        /* 文章卡片样式 */
        .article-card {
            display: block; text-decoration: none; padding: 30px; margin-bottom: 20px;
            background: rgba(15, 15, 15, 0.6); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px; backdrop-filter: blur(10px);
            transform: translateY(20px); transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .article-card:hover { background: rgba(25, 25, 25, 0.8); border-color: rgba(255, 255, 255, 0.15); }
        .article-title { color: #f5f5f7; font-size: 20px; font-weight: 600; margin: 0 0 12px 0; }
        .article-meta { color: #666; font-size: 13px; }

        /* 状态控制 */
        body.module-active canvas { opacity: 0.15; }
        body.module-active .text-mask-container { opacity: 0; }
        body.module-active #content-layer { opacity: 1; pointer-events: auto; }
        body.module-active .article-card { transform: translateY(0); }

        /* 加载动画 */
        .loading-text { color: #444; margin-top: 40px; font-size: 14px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <nav>
        <a onclick="routeTo('about')" id="nav-about">关于我</a>
        <a onclick="routeTo('cognition')" id="nav-cognition">认知脑科学</a>
        <a onclick="routeTo('cycling')" id="nav-cycling">骑行</a>
        <a onclick="routeTo('investment')" id="nav-investment">投资</a>
    </nav>

    <main>
        <canvas id="canvas-lines"></canvas>
        <div class="text-mask-container"><h1>hi, i'm yanzisheng</h1></div>
    </main>

    <div id="content-layer">
        <div id="module-about" class="article-list" style="display: none;">
             <div class="article-card">
                <h3 class="article-title">Zisheng Yan</h3>
                <p style="color:#888; line-height:1.8;">系统论与斯多葛哲学践行者。追求极简、客观与硬核的野蛮生长。</p>
             </div>
        </div>
        <div id="article-container" class="article-list" style="display: none;">
            </div>
    </div>

    <script>
        // --- 1. 数据配置 ---
        // 指向你刚部署成功的 Vercel API
        const API_URL = 'https://zazenyan-github-io-q1gd.vercel.app/api/notion'; 
        let allArticles = [];

        // --- 2. 路由逻辑 ---
        async function routeTo(moduleName) {
            const body = document.body;
            const navItems = document.querySelectorAll('nav a');
            const container = document.getElementById('article-container');
            const about = document.getElementById('module-about');

            // 返回主页
            if (document.getElementById(`nav-${moduleName}`).classList.contains('active')) {
                body.classList.remove('module-active');
                navItems.forEach(a => a.classList.remove('active'));
                return;
            }

            navItems.forEach(a => a.classList.remove('active'));
            document.getElementById(`nav-${moduleName}`).classList.add('active');
            
            // 显示/隐藏 模块
            about.style.display = (moduleName === 'about') ? 'block' : 'none';
            container.style.display = (moduleName === 'about') ? 'none' : 'block';

            if (moduleName !== 'about') {
                await loadNotionData(moduleName);
            }

            body.classList.add('module-active');
        }

        // --- 3. 数据抓取与渲染 ---
        async function loadNotionData(categoryMap) {
            const container = document.getElementById('article-container');
            container.innerHTML = '<div class="loading-text">正在同步 Notion 数据中心...</div>';

            // 映射中文分类
            const categoryName = {
                'cognition': '认知',
                'cycling': '骑行',
                'investment': '投资'
            }[categoryMap];

            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                // 解析 Notion 数据结构
                const articles = data.results.map(page => ({
                    title: page.properties.Name.title[0]?.plain_text || '未命名文章',
                    date: page.properties.Date?.date?.start || '',
                    category: page.properties.Category?.select?.name || '',
                    url: `https://www.notion.so/${page.id.replace(/-/g, '')}`
                }));

                // 过滤分类
                const filtered = articles.filter(a => a.category === categoryName);

                if (filtered.length === 0) {
                    container.innerHTML = `<div class="loading-text">还没有在 Notion 的“${categoryName}”分类下发布文章</div>`;
                    return;
                }

                // 渲染 HTML
                container.innerHTML = filtered.map(a => `
                    <a href="${a.url}" target="_blank" class="article-card">
                        <h3 class="article-title">${a.title}</h3>
                        <div class="article-meta"><span>${a.date}</span></div>
                    </a>
                `).join('');

            } catch (err) {
                container.innerHTML = `<div class="loading-text">数据链接中断: ${err.message}</div>`;
            }
        }

        // --- 4. Canvas 物理引擎 ---
        const canvas = document.getElementById('canvas-lines');
        const ctx = canvas.getContext('2d');
        let w, h, dpr = window.devicePixelRatio || 1;
        const colors = ["#FF006E", "#8338EC", "#00F5D4", "#FFBE0B"];
        
        function resize() {
            dpr = window.devicePixelRatio || 1;
            w = window.innerWidth; h = window.innerHeight;
            canvas.width = w * dpr; canvas.height = h * dpr;
            canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize); resize();

        let startTime = 0;
        function render(currentTime) {
            if (!startTime) startTime = currentTime;
            const elapsed = (currentTime - startTime) / 1000;
            const phase = (elapsed / 20) * Math.PI * 2;
            ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, w, h);
            for (let i = 0; i < Math.floor(h / 4) + 10; i++) {
                const y = i * 4;
                ctx.strokeStyle = colors[i % colors.length];
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.bezierCurveTo(w*0.33, y + Math.sin(phase)*60, w*0.66, y + Math.sin(phase+0.5)*36, w, y);
                ctx.stroke();
            }
            requestAnimationFrame(render);
        }
        requestAnimationFrame(render);
    </script>
</body>
</html>
